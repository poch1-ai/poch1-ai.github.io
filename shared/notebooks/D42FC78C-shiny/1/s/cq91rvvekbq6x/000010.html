<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>body{background-color:white;}</style>
<link href="lib/selectize-0.15.2/css/selectize.bootstrap3.css" rel="stylesheet" />
<script src="lib/selectize-0.15.2/js/selectize.min.js"></script>
<script src="lib/selectize-0.15.2/accessibility/js/selectize-plugin-a11y.min.js"></script>
<script src="lib/ionrangeslider-javascript-2.3.1/js/ion.rangeSlider.min.js"></script>
<script src="lib/strftime-0.9.2/strftime-min.js"></script>
<link href="lib/ionrangeslider-css-2.3.1/css/ion.rangeSlider.css" rel="stylesheet" />

</head>
<body>
<div class="shiny-input-panel">
  <div class="shiny-flow-layout">
    <div>
      <div class="form-group shiny-input-container">
        <label class="control-label" id="n_breaks-label" for="n_breaks">Number of bins:</label>
        <div>
          <select id="n_breaks" class="shiny-input-select"><option value="10">10</option>
<option value="20" selected>20</option>
<option value="35">35</option>
<option value="50">50</option></select>
          <script type="application/json" data-for="n_breaks" data-nonempty="">{"plugins":["selectize-plugin-a11y"]}</script>
        </div>
      </div>
    </div>
    <div>
      <div class="form-group shiny-input-container">
        <label class="control-label" id="bw_adjust-label" for="bw_adjust">Bandwidth adjustment:</label>
        <input class="js-range-slider" id="bw_adjust" data-skin="shiny" data-min="0.2" data-max="2" data-from="1" data-step="0.2" data-grid="true" data-grid-num="9" data-grid-snap="false" data-prettify-separator="," data-prettify-enabled="true" data-keyboard="true" data-data-type="number"/>
      </div>
    </div>
  </div>
</div>
</body>
</html>
